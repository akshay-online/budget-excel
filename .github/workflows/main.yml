name: Budget Allocation
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  Budget-allocation:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Automate GitHub Copilot User Budget
        uses: CanarysAutomations/Automate-GitHub-Copilot-User-Budget@v1.1
        # uses: CanarysAutomations/Automate-GitHub-Copilot-User-Budget@aksh/v1.1
        with:
          budgets_file: 'budgets.csv'
          enterprise_slug: 'ecanarys'
          api_version: '2026-03-10'
          github_token: ${{ secrets.ENTERPRISE_BILLING_TOKEN }}
      
      - name: Upload Budget Reports
        uses: actions/upload-artifact@v4
        with:
            name: budget-allocation-report
            path: |
              allocation.csv
              budget-run-report.md
